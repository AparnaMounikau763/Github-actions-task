name: Test EXE with Selenium

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest   # IMPORTANT for .exe

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install pyinstaller flask

    - name: Build EXE
      run: |
        pyinstaller --onefile app.py

    - name: Install Chrome
      uses: browser-actions/setup-chrome@v1

    - name: Run Tests
      run: pytest -v
